services:
  marmot-server:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      # Optional API key — if set, all requests must include:
      #   HTTP:      Authorization: Bearer <key>
      #   WebSocket: ws://localhost:8080/v1/events?key=<key>
      #   SSE:       GET /api/v1/events?key=<key>  (signal-cli compat)
      # API_KEY: "change-me"

      # Comma-separated default Nostr relays
      DEFAULT_RELAYS: "wss://relay.damus.io,wss://nos.lol"

      # SQLite database path (inside the container)
      DB_PATH: "/data/marmot.db"

      # Logging verbosity: trace | debug | info | warn | error
      LOG_LEVEL: "info"

      # Optional: deterministic identity. Accepts a 64-char hex private key or
      # an nsec bech32 string. When set, overwrites any existing stored key on
      # startup (useful for restoring a backup identity).
      # IDENTITY_KEY: "nsec1..."

      # Optional: comma-separated npubs (or 64-char hex pubkeys) whose incoming
      # group invitations are automatically accepted without a manual API call.
      # AUTO_ACCEPT_FROM: "npub1...,npub1..."

      # Optional: comma-separated npubs (or 64-char hex pubkeys) allowed to send
      # messages to the agent via the SSE stream. Messages from all other senders
      # are silently dropped. Mirrors TELEGRAM_ALLOWED_USERS / SLACK_ALLOWED_USERS.
      # When unset, all senders are forwarded.
      # SIGNAL_ALLOWED_USERS: "npub1...,npub1..."
    restart: unless-stopped
