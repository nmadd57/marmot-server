services:
  marmot-server:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      # Optional API key — if set, all requests must include:
      #   HTTP:      Authorization: Bearer <key>
      #   WebSocket: ws://localhost:8080/v1/events?key=<key>
      #   SSE:       GET /api/v1/events?key=<key>  (signal-cli compat)
      # API_KEY: "change-me"

      # Comma-separated default Nostr relays
      DEFAULT_RELAYS: "wss://relay.damus.io,wss://nos.lol"

      # SQLite database path (inside the container)
      DB_PATH: "/data/marmot.db"

      # Logging verbosity: trace | debug | info | warn | error
      LOG_LEVEL: "info"

      # Optional: deterministic identity. Accepts a 64-char hex private key or
      # an nsec bech32 string. When set, overwrites any existing stored key on
      # startup (useful for restoring a backup identity).
      # IDENTITY_KEY: "nsec1..."

      # Optional: comma-separated npubs (or 64-char hex pubkeys) whose incoming
      # group invitations are automatically accepted without a manual API call.
      # AUTO_ACCEPT_FROM: "npub1...,npub1..."

      # hermes-agent access control (mirrors TELEGRAM_ALLOWED_USERS pattern):
      #
      # SIGNAL_ALLOWED_USERS: comma-separated npubs/hex pubkeys allowed to send
      # messages to the agent. When set, all other senders are silently dropped.
      # When unset, unknown senders are also dropped — use SIGNAL_ALLOW_ALL_USERS
      # to open access without an explicit list.
      # SIGNAL_ALLOWED_USERS: "npub1...,npub1..."
      #
      # SIGNAL_ALLOW_ALL_USERS: set to "true" to forward messages from everyone.
      # Equivalent to open-access mode. Use with caution.
      # SIGNAL_ALLOW_ALL_USERS: "true"
      #
      # SIGNAL_GROUP_ALLOWED_USERS: which groups to forward. Unset or "*" = all
      # groups (marmot default). Comma-separated base64 group IDs to restrict.
      # SIGNAL_GROUP_ALLOWED_USERS: "*"
    restart: unless-stopped
